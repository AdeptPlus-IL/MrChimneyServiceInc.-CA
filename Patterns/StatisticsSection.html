<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E8650A', /* MrChimney Orange */
                        'primary-dark': '#C25105', /* Darker Orange for borders */
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased font-sans">
    
    <section class="w-full bg-primary relative overflow-hidden">
        <!-- Optional noise/texture overlay for high fidelity - using CSS pseudo-element for subtle noise -->
        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>

        <div class="max-w-7xl mx-auto relative z-10 w-full py-16 lg:py-24">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 w-full">
                
                <!-- Stat 1 -->
                <div class="flex flex-col items-center justify-center text-center p-8 border-b sm:border-r border-primary-dark lg:border-b-0">
                    <div class="text-white font-black text-[48px] leading-tight mb-2"><span class="stat-counter" data-target="18">0</span>+</div>
                    <div class="text-white font-bold text-[16px] uppercase tracking-[0.8px] max-w-[200px]">
                        Years Serving Los Angeles
                    </div>
                </div>

                <!-- Stat 2 -->
                <div class="flex flex-col items-center justify-center text-center p-8 border-b sm:border-r-0 lg:border-r border-primary-dark lg:border-b-0">
                    <div class="text-white font-black text-[48px] leading-tight mb-2"><span class="stat-counter" data-target="1000">0</span>+</div>
                    <div class="text-white font-bold text-[16px] uppercase tracking-[0.8px] max-w-[200px]">
                        Chimneys Inspected & Cleaned
                    </div>
                </div>

                <!-- Stat 3 -->
                <div class="flex flex-col items-center justify-center text-center p-8 border-b sm:border-r border-primary-dark sm:border-b-0">
                    <div class="text-white font-black text-[48px] leading-tight mb-2 flex items-center justify-center gap-2">
                        <span class="stat-counter" data-target="5">0</span> <svg class="w-8 h-8 -mt-1" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                    </div>
                    <div class="text-white font-bold text-[16px] uppercase tracking-[0.8px] max-w-[220px]">
                        Average Google Rating
                    </div>
                </div>

                <!-- Stat 4 -->
                <div class="flex flex-col items-center justify-center text-center p-8">
                    <div class="text-white font-black text-[48px] leading-tight mb-2">#<span class="stat-counter" data-target="1">0</span></div>
                    <div class="text-white font-bold text-[16px] uppercase tracking-[0.8px] max-w-[200px]">
                        Rated Service in SFV
                    </div>
                </div>

            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const counters = document.querySelectorAll('.stat-counter');
            
            const animateCounter = (counter) => {
                const target = +counter.getAttribute('data-target');
                const duration = 2000;
                const incrementTime = 30;
                const steps = duration / incrementTime;
                const increment = target / steps;
                let current = 0;

                const updateCounter = () => {
                    current += increment;
                    if (current < target) {
                        counter.innerText = Math.ceil(current).toLocaleString();
                        setTimeout(updateCounter, incrementTime);
                    } else {
                        counter.innerText = target.toLocaleString();
                    }
                };
                
                updateCounter();
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        animateCounter(entry.target);
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.5 });

            counters.forEach(counter => observer.observe(counter));
        });
    </script>
</body>
</html>
