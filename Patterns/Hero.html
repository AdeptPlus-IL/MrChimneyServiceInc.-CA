<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E8650A', /* MrChimney Orange */
                        dark: '#1A1A18',
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased font-sans">
    <!-- Hero Section -->
    <section class="relative w-full min-h-[677px] flex items-center bg-gray-900 overflow-hidden">
        <!-- Exact Figma matched background image mask for Desktop, Object-Cover for mobile -->
        <div class="absolute inset-0 pointer-events-none z-0">
            <img src="https://imagedelivery.net/pSzvO9yisA8Y6-ZdX7rSww/MrChimneyServiceInc.-CA/hero-bg.png/hero" alt="MrChimney Home Background" class="absolute w-full h-full object-cover md:h-[276.51%] md:left-[-0.02%] md:max-w-none md:top-[-129.38%] md:w-full" />
        </div>
        <!-- Overlay -->
        <div class="absolute inset-0 bg-[#1a1a18] opacity-75 z-0"></div>

        <!-- Content Container -->
        <div class="relative z-10 w-full max-w-7xl mx-auto px-4 md:px-8 lg:px-16 py-20 flex flex-col items-center text-center">
            
            <!-- Supertitle -->
            <span class="text-white text-base tracking-[0.7px] uppercase mb-8">
                Home
            </span>

            <!-- Main Heading -->
            <h1 class="text-white font-black text-5xl md:text-6xl lg:text-[72px] leading-tight lg:leading-[90px] tracking-tight md:tracking-[-1.8px] mb-6 max-w-4xl mx-auto">
                Los Angeles' Most <span class="text-primary">Trusted</span><br class="hidden md:block"> Chimney Sweep
            </h1>

            <!-- Paragraph -->
            <p class="text-white text-lg md:text-[18px] leading-[28px] max-w-[768px] mx-auto mb-12">
                18 years serving the LA community. Family owned, CSIA certified, and committed to 5-star service on every job.
            </p>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="/estimate" class="inline-flex items-center justify-center px-8 py-[17.5px] bg-primary text-white font-bold uppercase text-[14px] tracking-[0.35px] hover:bg-opacity-90 transition-all duration-300 w-full sm:w-auto text-center border-2 border-primary">
                    Get a Free Estimate
                </a>
                <a href="/services" class="inline-flex items-center justify-center px-8 py-[17.5px] bg-transparent text-white border-2 border-white font-bold uppercase text-[14px] tracking-[0.35px] hover:bg-white hover:text-dark transition-all duration-300 w-full sm:w-auto text-center">
                    View Our Services
                </a>
            </div>
            
        </div>
    </section>
</body>
</html>
