<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E8650A', /* MrChimney Orange */
                        dark: '#111111', /* Darker background */
                        'dark-form': '#1A1A18', /* Form container background */
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased font-sans">
    
    <section class="w-full bg-dark py-16 lg:py-24 relative">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16 items-center">
                
                <!-- Left Column: Form -->
                <div class="bg-dark-form p-8 md:p-10 border border-gray-800 shadow-xl lg:order-1 order-2">
                    <form action="#" method="POST" class="space-y-6">
                        <!-- Name Field -->
                        <div>
                            <label for="name" class="block text-[14px] font-bold text-white mb-2">Name</label>
                            <input type="text" id="name" name="name" placeholder="Your Name" class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" required>
                        </div>
                        
                        <!-- Phone Number Field -->
                        <div>
                            <label for="phone" class="block text-[14px] font-bold text-white mb-2">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" required>
                        </div>

                        <!-- Service Needed Field -->
                        <div>
                            <label for="service" class="block text-[14px] font-bold text-white mb-2">Service Needed</label>
                            <input type="text" id="service" name="service" placeholder="e.g. Chimney Sweeping" class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" required>
                        </div>

                        <!-- Message Field -->
                        <div>
                            <label for="message" class="block text-[14px] font-bold text-white mb-2">Message</label>
                            <textarea id="message" name="message" rows="4" placeholder="How can we help you?" class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors resize-none" required></textarea>
                        </div>

                        <!-- Submit Button -->
                        <div>
                            <button type="submit" class="w-full bg-primary hover:bg-[#C25105] text-white font-bold px-6 py-4 uppercase tracking-[0.8px] text-[14px] transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-dark-form">
                                Get A Free Estimate
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Right Column: Text Content -->
                <div class="flex flex-col justify-center lg:order-2 order-1">
                    <div class="text-primary font-bold uppercase tracking-[0.65px] text-[14px] sm:text-[16px] mb-4">
                        Get In Touch
                    </div>
                    <h2 class="text-4xl sm:text-5xl lg:text-[48px] font-black text-white leading-[1.1] mb-6">
                        Ready for a Cleaner, <br class="hidden sm:block"><span class="text-primary">Safer</span> Chimney?
                    </h2>
                    <p class="text-white/80 text-[16px] leading-[1.6] max-w-lg">
                        Schedule your inspection or cleaning today. We serve the greater Los Angeles area, Monday through Friday, 7am to 5pm. No hidden fees. Just honest work.
                    </p>
                </div>

            </div>
        </div>
    </section>

</body>
</html>
