<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#E8650A', /* MrChimney Orange */
                        dark: '#1A1A18',
                        darker: '#1A1A1A',
                        borderGray: '#3A3A36'
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased font-sans bg-gray-100">
    <!-- Header Section -->
    <header class="w-full bg-white text-dark border-b border-borderGray relative z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-8 lg:px-16 py-4 flex justify-between items-center">
            
            <!-- Logo -->
            <a href="/" class="flex-shrink-0">
                <!-- Using a placeholder image matching the dimensions (w-168px, h-80px) and style -->
                <!-- Since the actual logo.png needs to be downloaded, we assume it's located at ../Assets/logo.png -->
                <img src="../Assets/logo.png" alt="MrChimneyServiceInc Logo" class="h-16 md:h-20 w-auto object-contain brightness-0" onerror="this.onerror=null; this.src='https://placehold.co/168x80/1A1A18/FFF?text=CHIMNEY+SWEEP+SERVICES'" />
            </a>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden flex items-center p-2 text-dark hover:text-primary transition-colors focus:outline-none" aria-label="Toggle navigation">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>

            <!-- Desktop Navigation Links -->
            <nav class="hidden md:flex items-center gap-6 lg:gap-8 font-bold text-base text-dark">
                <a href="/chimney-sweep" class="hover:text-primary transition-colors duration-300">Chimney Sweep</a>
                <a href="/chimney-inspections" class="hover:text-primary transition-colors duration-300">Chimney Inspections</a>
                <div class="relative group">
                    <button class="flex items-center hover:text-primary transition-colors duration-300 focus:outline-none font-bold">
                        Chimney Repairs
                        <svg class="w-4 h-4 ml-1.5 transition-transform duration-300 group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 9l6 6 6-6"></path>
                        </svg>
                    </button>
                    <!-- Dropdown could be added here if needed -->
                </div>
                <a href="/about-us" class="hover:text-primary transition-colors duration-300">About Us</a>
                <a href="/contact" class="hover:text-primary transition-colors duration-300">Contact</a>
            </nav>

            <!-- Desktop Button -->
            <div class="hidden md:block">
                <a href="/estimate" class="inline-flex items-center justify-center px-6 py-3 bg-primary text-white font-bold uppercase text-[14px] tracking-[0.35px] hover:bg-opacity-90 transition-all duration-300 h-12">
                    Get a Free Estimate
                </a>
            </div>
        </div>

        <!-- Mobile Menu (Hidden by default) -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-borderGray">
            <nav class="flex flex-col px-4 pt-2 pb-6 space-y-4 shadow-xl text-dark">
                <a href="/chimney-sweep" class="block px-3 py-2 text-base font-bold hover:text-primary transition-colors">Chimney Sweep</a>
                <a href="/chimney-inspections" class="block px-3 py-2 text-base font-bold hover:text-primary transition-colors">Chimney Inspections</a>
                <a href="/chimney-repairs" class="block px-3 py-2 text-base font-bold hover:text-primary transition-colors">Chimney Repairs</a>
                <a href="/about-us" class="block px-3 py-2 text-base font-bold hover:text-primary transition-colors">About Us</a>
                <a href="/contact" class="block px-3 py-2 text-base font-bold hover:text-primary transition-colors">Contact</a>
                <div class="pt-4 border-t border-borderGray">
                     <a href="/estimate" class="block w-full text-center px-6 py-3 bg-primary text-white font-bold uppercase text-[14px] tracking-[0.35px] hover:bg-opacity-90 transition-all duration-300">
                        Get a Free Estimate
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <script>
        // Simple mobile menu toggle
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            var menu = document.getElementById('mobile-menu');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
            } else {
                menu.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
