    <!-- PREVIEW WRAPPER — remove this div when embedding in a section -->
    <div class="max-w-[800px] mx-auto px-4 py-12">
    <!-- ============================================================ -->

    <!-- ChimneyFormOne: Fields based on TheFireFactory contact form -->
    <!-- FormSpree: Replace YOUR_FORM_ID with your actual Formspree form ID -->
    <form
        action="https://formspree.io/f/YOUR_FORM_ID"
        method="POST"
        class="space-y-6 bg-dark-form p-8 md:p-10 border border-gray-800 shadow-xl w-full"
    >

        <!-- First Name + Last Name -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label for="first_name" class="block text-[14px] font-bold text-white mb-2">
                    First Name <span class="text-primary">*</span>
                </label>
                <input
                    type="text"
                    id="first_name"
                    name="first_name"
                    placeholder="Jane"
                    class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                    required
                >
            </div>
            <div>
                <label for="last_name" class="block text-[14px] font-bold text-white mb-2">
                    Last Name <span class="text-primary">*</span>
                </label>
                <input
                    type="text"
                    id="last_name"
                    name="last_name"
                    placeholder="Smith"
                    class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                    required
                >
            </div>
        </div>

        <!-- Email + Phone -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label for="email" class="block text-[14px] font-bold text-white mb-2">
                    Email <span class="text-primary">*</span>
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="jane@example.com"
                    class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                    required
                >
            </div>
            <div>
                <label for="phone" class="block text-[14px] font-bold text-white mb-2">
                    Phone <span class="text-white/50 font-normal text-[12px]">(optional)</span>
                </label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="(262) 555-0000"
                    class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                >
            </div>
        </div>

        <!-- I Am Interested In -->
        <div>
            <label for="interest" class="block text-[14px] font-bold text-white mb-2">
                I Am Interested In <span class="text-primary">*</span>
            </label>
            <input
                type="text"
                id="interest"
                name="interest"
                placeholder="e.g. Fireplace Installation, Wood Stoves…"
                class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors"
                required
            >
        </div>

        <!-- Message -->
        <div>
            <label for="message" class="block text-[14px] font-bold text-white mb-2">
                Message <span class="text-white/50 font-normal text-[12px]">(optional)</span>
            </label>
            <textarea
                id="message"
                name="message"
                rows="5"
                placeholder="Tell us how we can help…"
                class="w-full px-4 py-3 bg-white text-gray-900 border border-transparent focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors resize-none"
            ></textarea>
        </div>

        <!-- Privacy Note -->
        <p class="text-white/40 text-[12px] leading-relaxed">
            We respect your privacy. Your information will only be used to respond to your inquiry.
        </p>

        <!-- Formspree honeypot spam filter -->
        <input type="text" name="_gotcha" style="display:none">

        <!-- Submit -->
        <div>
            <button
                type="submit"
                id="chimney-form-one-submit"
                class="w-full bg-primary hover:bg-[#C25105] text-white font-bold px-6 py-4 uppercase tracking-[0.8px] text-[14px] transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-dark-form"
            >
                Send Inquiry
            </button>
        </div>

    </form>

    <!-- ============================================================ -->
    <!-- END PREVIEW WRAPPER — remove the opening and closing wrapper divs when embedding -->
    </div>
    <!-- ============================================================ -->
